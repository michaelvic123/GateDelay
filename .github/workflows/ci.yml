name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: Backend

      - name: Run ESLint
        run: npm run lint
        working-directory: Backend

  test:
    name: Run Jest Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: Backend

      - name: Run Jest test suites
        run: npm run test
        working-directory: Backend

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    # Only deploy when pushing/merging directly to main or master
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: Backend

      - name: Execute Deployment script (Dry Run)
        run: node scripts/deploy.js production ${{ github.sha }} --dry-run
        working-directory: Backend
        env:
          NODE_ENV: production
